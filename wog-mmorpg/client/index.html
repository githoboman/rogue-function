<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WoG MMORPG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08080d; color: #e0d5c5; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

    /* ── Topbar ─────────────────────────────────────────── */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; background: linear-gradient(180deg, #111118 0%, #0c0c14 100%);
      border-bottom: 1px solid #1a1a2a; height: 48px; flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    #topbar h1 {
      font-size: 13px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
      color: #c8a84b; text-shadow: 0 0 20px rgba(200,168,75,0.15);
    }
    .topbar-stats {
      display: flex; gap: 16px; font-size: 11px; color: #555; font-weight: 500;
    }
    .topbar-stats .stat-val { color: #888; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    #tick-count { font-size: 10px; color: #333; font-family: 'Courier New', monospace; }
    #connection-status {
      font-size: 10px; padding: 4px 12px; border-radius: 20px; font-weight: 600;
      background: rgba(20,20,35,0.8); border: 1px solid #222;
      transition: all 0.3s;
    }
    #connection-status.connected { color: #4caf50; border-color: rgba(76,175,80,0.3); background: rgba(76,175,80,0.08); }
    #connection-status.disconnected { color: #f44336; border-color: rgba(244,67,54,0.3); background: rgba(244,67,54,0.08); }

    /* ── Main Layout ───────────────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }
    #game-container { flex: 1; position: relative; overflow: hidden; background: #0a0a14; }
    #game-container canvas { display: block; }

    /* ── Zone Tabs ──────────────────────────────────────── */
    #zone-tabs { position: absolute; top: 10px; left: 10px; display: flex; gap: 4px; z-index: 10; }
    .zone-tab {
      padding: 6px 14px; background: rgba(8,8,13,0.9); border: 1px solid #222;
      border-radius: 6px; font-size: 11px; cursor: pointer; color: #666;
      font-weight: 500; transition: all 0.2s; backdrop-filter: blur(8px);
    }
    .zone-tab:hover { color: #999; border-color: #444; background: rgba(20,20,30,0.9); }
    .zone-tab.active { color: #c8a84b; border-color: rgba(200,168,75,0.4); background: rgba(200,168,75,0.08); }

    /* ── Right Panel ───────────────────────────────────── */
    #right-panel {
      width: 320px; flex-shrink: 0; background: #0a0a12;
      border-left: 1px solid #151520; display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-section { border-bottom: 1px solid #151520; }
    .panel-title {
      padding: 10px 16px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: #c8a84b; background: rgba(200,168,75,0.03); font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-title .badge {
      background: rgba(200,168,75,0.12); color: #c8a84b; padding: 2px 8px;
      border-radius: 10px; font-size: 9px; font-weight: 700;
    }

    /* ── Join Game Form ─────────────────────────────────── */
    #join-section { padding: 14px 16px; }
    #join-form { display: flex; flex-direction: column; gap: 10px; }
    #join-form label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    #join-form input, #join-form select {
      background: #111118; border: 1px solid #222; color: #e0d5c5; padding: 8px 12px;
      font-family: 'Inter', system-ui, sans-serif; font-size: 12px; border-radius: 6px; outline: none;
      transition: border-color 0.2s;
    }
    #join-form input:focus, #join-form select:focus { border-color: #c8a84b; box-shadow: 0 0 0 2px rgba(200,168,75,0.1); }
    #join-form select { cursor: pointer; }
    #join-btn {
      background: linear-gradient(135deg, #c8a84b 0%, #b8943b 100%); color: #0a0a0f;
      border: none; padding: 10px 18px; font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; border-radius: 6px; transition: all 0.2s; margin-top: 4px;
    }
    #join-btn:hover { background: linear-gradient(135deg, #dabb5c 0%, #c8a84b 100%); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(200,168,75,0.2); }
    #join-btn:disabled { background: #333; cursor: not-allowed; transform: none; box-shadow: none; }
    #join-status { font-size: 10px; color: #666; min-height: 14px; font-weight: 500; }
    #join-status.success { color: #44cc66; }
    #agent-controls { display: none; }
    .apikey-hint { font-size: 9px; color: #383838; margin-top: -4px; }

    /* ── Agent Cards ────────────────────────────────────── */
    #agents-list { overflow-y: auto; max-height: 320px; }
    .agent-card {
      padding: 12px 16px; border-bottom: 1px solid #111118;
      border-left: 3px solid transparent; transition: all 0.2s;
      position: relative;
    }
    .agent-card:hover { background: rgba(255,255,255,0.015); }
    .agent-card[data-class="Warrior"]     { border-left-color: #dd6644; }
    .agent-card[data-class="Mage"]        { border-left-color: #7766ee; }
    .agent-card[data-class="Ranger"]      { border-left-color: #55bb55; }
    .agent-card[data-class="Cleric"]      { border-left-color: #eebb33; }
    .agent-card[data-class="Rogue"]       { border-left-color: #cc5588; }
    .agent-card[data-class="Paladin"]     { border-left-color: #4499ee; }
    .agent-card[data-class="Necromancer"] { border-left-color: #9944cc; }
    .agent-card[data-class="Druid"]       { border-left-color: #44bb99; }

    .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .agent-name { font-size: 12px; font-weight: 700; color: #e0d5c5; }
    .agent-level {
      font-size: 10px; color: #c8a84b; font-weight: 700;
      background: rgba(200,168,75,0.1); padding: 2px 8px; border-radius: 10px;
    }
    .agent-class-zone { font-size: 10px; color: #444; margin-bottom: 6px; font-weight: 500; }

    /* HP Bar */
    .bar-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    .bar-label { font-size: 9px; color: #444; width: 18px; text-align: right; font-weight: 600; }
    .bar-track { flex: 1; background: #111118; height: 6px; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .bar-fill.hp { background: linear-gradient(90deg, #2d8c3e, #4caf50); }
    .bar-fill.hp.low { background: linear-gradient(90deg, #cc3333, #dd5555); }
    .bar-fill.hp.mid { background: linear-gradient(90deg, #cc8833, #ddaa44); }
    .bar-fill.xp { background: linear-gradient(90deg, #5566cc, #7788ee); }
    .bar-value { font-size: 9px; color: #555; width: 42px; font-family: 'Courier New', monospace; }

    /* Agent Stats Row */
    .agent-stats-row {
      display: flex; gap: 12px; font-size: 10px; color: #555; margin-top: 6px;
      font-weight: 500;
    }
    .agent-stats-row .stat-icon { margin-right: 2px; }
    .stat-gold { color: #c8a84b; }
    .stat-quests { color: #81c784; }
    .stat-kills { color: #e57373; }

    .agent-action {
      font-size: 10px; color: #3a4455; margin-top: 4px; font-style: italic;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Leaderboard ───────────────────────────────────── */
    #leaderboard-list { padding: 4px 0; }
    .lb-row {
      display: flex; align-items: center; padding: 6px 16px; gap: 10px;
      font-size: 11px; transition: background 0.2s;
    }
    .lb-row:hover { background: rgba(255,255,255,0.015); }
    .lb-rank {
      width: 22px; text-align: center; font-weight: 700; font-size: 12px;
    }
    .lb-rank.gold   { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.3); }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-rank.normal { color: #444; }
    .lb-name { flex: 1; font-weight: 600; color: #ccc; }
    .lb-score { font-weight: 700; color: #c8a84b; font-family: 'Courier New', monospace; font-size: 12px; }

    /* ── Event Log ─────────────────────────────────────── */
    #event-log { flex: 1; overflow-y: auto; padding: 4px 0; }
    .event-entry {
      padding: 5px 16px; font-size: 11px; line-height: 1.5; color: #555;
      border-left: 2px solid transparent; animation: fadeIn 0.3s ease;
      display: flex; align-items: baseline; gap: 6px;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .event-entry.combat  { color: #e57373; border-left-color: #e57373; }
    .event-entry.quest   { color: #81c784; border-left-color: #81c784; }
    .event-entry.level   { color: #ffd54f; border-left-color: #ffd54f; background: rgba(255,213,79,0.03); font-weight: 600; }
    .event-entry.death   { color: #ef9a9a; border-left-color: #ef9a9a; }
    .event-entry.zone    { color: #ce93d8; border-left-color: #ce93d8; }
    .event-entry.loot    { color: #a5d6a7; border-left-color: #66bb6a; }
    .event-entry.system  { color: #444; }
    .event-entry.streak  { color: #ffb74d; border-left-color: #ff9800; font-weight: 600; }
    .event-time { color: #282828; font-size: 9px; font-family: 'Courier New', monospace; flex-shrink: 0; }
    .event-text { flex: 1; }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a1a2a; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a2a3a; }
  </style>
</head>
<body>
  <div id="topbar">
    <div class="topbar-left">
      <h1>World of Genesis</h1>
      <div class="topbar-stats">
        <span>Players <span class="stat-val" id="stat-players">0</span></span>
        <span>Kills <span class="stat-val" id="stat-kills">0</span></span>
        <span>Gold <span class="stat-val" id="stat-gold">0</span></span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="tick-count"></span>
      <div id="connection-status" class="disconnected">Connecting...</div>
    </div>
  </div>
  <div id="main">
    <div id="game-container">
      <div id="zone-tabs">
        <div class="zone-tab active" data-zone="human_meadow">Human Meadow</div>
        <div class="zone-tab" data-zone="wild_meadow">Wild Meadow</div>
        <div class="zone-tab" data-zone="dark_forest">Dark Forest</div>
      </div>
    </div>
    <div id="right-panel">
      <!-- Join Game -->
      <div class="panel-section">
        <div class="panel-title">Join Game</div>
        <div id="join-section">
          <form id="join-form">
            <label for="join-name">Agent Name</label>
            <input type="text" id="join-name" placeholder="Shadow" maxlength="20" autocomplete="off" />

            <label for="join-class">Class</label>
            <select id="join-class">
              <option value="Warrior">Warrior &mdash; melee tank</option>
              <option value="Mage">Mage &mdash; ranged damage</option>
              <option value="Ranger">Ranger &mdash; balanced</option>
              <option value="Cleric">Cleric &mdash; healer</option>
              <option value="Rogue">Rogue &mdash; gold hunter</option>
            </select>

            <label for="join-wallet">Stacks Wallet (earn rewards)</label>
            <input type="text" id="join-wallet" placeholder="ST1PQHQKV0RJXZFY1DGX8MNSNYVE3VGZJSRTPGZGM" autocomplete="off" />
            <div class="apikey-hint">Your STX address. Gold &amp; XP mint directly to your wallet.</div>

            <label for="join-apikey">Claude API Key</label>
            <input type="password" id="join-apikey" placeholder="sk-ant-..." autocomplete="off" />
            <div class="apikey-hint">Your key stays in your browser. Never sent to our server.</div>

            <button type="submit" id="join-btn">Join Game</button>
            <div id="join-status"></div>
          </form>
          <div id="agent-controls"></div>
        </div>
      </div>

      <!-- AI Agents -->
      <div class="panel-section">
        <div class="panel-title">Agents <span class="badge" id="agents-count">0</span></div>
        <div id="agents-list"></div>
      </div>

      <!-- Leaderboard -->
      <div class="panel-section">
        <div class="panel-title">Leaderboard</div>
        <div id="leaderboard-list"></div>
      </div>

      <!-- Event Log -->
      <div class="panel-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div class="panel-title">Event Log</div>
        <div id="event-log"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
